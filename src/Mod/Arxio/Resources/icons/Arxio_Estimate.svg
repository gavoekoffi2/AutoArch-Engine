        fill="#e6edf3" stroke="#24292f" stroke-width="2"/>
  <rect x="22" y="4" width="20" height="8" rx="2" ry="2"
        fill="#1f6feb" stroke="#24292f" stroke-width="1.8"/>
  <!-- Rows -->
  <line x1="18" y1="22" x2="46" y2="22" stroke="#8b949e" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="18" y1="30" x2="40" y2="30" stroke="#8b949e" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="18" y1="38" x2="44" y2="38" stroke="#8b949e" stroke-width="1.6" stroke-linecap="round"/>
