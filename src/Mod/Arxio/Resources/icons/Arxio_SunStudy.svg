<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Ground -->
  <line x1="4" y1="50" x2="60" y2="50" stroke="#24292f" stroke-width="2" stroke-linecap="round"/>
  <!-- Building outline -->
  <rect x="36" y="30" width="18" height="20" fill="#d1d9e0" stroke="#24292f" stroke-width="1.8"/>
  <polygon points="34,30 45,20 56,30" fill="#f78166" stroke="#24292f" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Shadow (projection on ground) -->
  <polygon points="34,50 54,50 22,50" fill="#8b949e" opacity="0.35"/>
  <!-- Sun -->
  <circle cx="16" cy="18" r="6" fill="#f7e06e" stroke="#f78166" stroke-width="1.5"/>
  <g stroke="#f7e06e" stroke-width="2" stroke-linecap="round">
    <line x1="16" y1="4" x2="16" y2="8"/>
    <line x1="4" y1="18" x2="8" y2="18"/>
    <line x1="7" y1="9" x2="10" y2="12"/>
    <line x1="25" y1="9" x2="22" y2="12"/>
  </g>
</svg>
